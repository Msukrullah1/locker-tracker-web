<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locker Tracker - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1e2a3a 0%, #253447 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
        }
        
        .card {
            background: #253447;
            border: 1px solid #3a5068;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
            padding: 40px;
        }
        
        .card-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .card-header .logo {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        
        .card-header h1 {
            color: #4db8ff;
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .card-header p {
            color: #8fa8c0;
            font-size: 0.9rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            color: #8fa8c0;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .form-control {
            background: #1e2a3a;
            border: 1px solid #3a5068;
            color: #ffffff;
            padding: 12px;
            border-radius: 5px;
            font-size: 1rem;
        }
        
        .form-control:focus {
            background: rgba(77, 184, 255, 0.05);
            border-color: #4db8ff;
            color: #ffffff;
            box-shadow: 0 0 0 0.2rem rgba(77, 184, 255, 0.25);
        }
        
        .form-control::placeholder {
            color: #4a6480;
        }
        
        .form-check {
            margin-top: 15px;
            margin-bottom: 20px;
        }
        
        .form-check-input {
            background: #1e2a3a;
            border: 1px solid #3a5068;
            cursor: pointer;
        }
        
        .form-check-input:checked {
            background: #4db8ff;
            border-color: #4db8ff;
        }
        
        .form-check-label {
            color: #8fa8c0;
            cursor: pointer;
            margin-left: 5px;
        }
        
        .btn-login {
            background: #4db8ff;
            color: #1e2a3a;
            border: none;
            padding: 12px;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 5px;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        
        .btn-login:hover {
            background: #3aa0e0;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(77, 184, 255, 0.3);
        }
        
        .alert {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid #dc3545;
            color: #ff6b6b;
            border-radius: 5px;
            padding: 12px;
            margin-bottom: 20px;
        }
        
        .divider {
            border-top: 1px solid #3a5068;
            margin: 25px 0;
        }
        
        .demo-info {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #3a5068;
        }
        
        .demo-info p {
            color: #8fa8c0;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }
        
        .demo-info .code {
            background: #1e2a3a;
            color: #4db8ff;
            padding: 8px 12px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            display: inline-block;
        }
        
        .loading {
            display: none;
            text-align: center;
        }
        
        .spinner-border {
            color: #4db8ff;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="card">
            <!-- Header -->
            <div class="card-header">
                <div class="logo">🔒</div>
                <h1>Locker Tracker</h1>
                <p>Office Locker Management System</p>
            </div>

            <!-- Error Message -->
            {% if error %}
            <div class="alert">{{ error }}</div>
            {% endif %}

            <!-- Login Form -->
            <form id="loginForm" method="POST">
                <div class="form-group">
                    <label for="user_id">User ID</label>
                    <input type="text" class="form-control" id="user_id" name="user_id" 
                           placeholder="Enter your User ID" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" class="form-control" id="password" name="password" 
                           placeholder="Enter your password" required>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="showPassword">
                    <label class="form-check-label" for="showPassword">
                        Show Password
                    </label>
                </div>

                <button type="submit" class="btn-login">LOGIN</button>

                <div class="loading" id="loading">
                    <div class="spinner-border" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p style="color: #8fa8c0; margin-top: 10px;">Logging in...</p>
                </div>
            </form>

            <!-- Demo Credentials -->
            <div class="demo-info">
                <p><strong>Demo Credentials:</strong></p>
                <p>
                    <span class="code">superadmin / Admin@123</span>
                </p>
                <p style="font-size: 0.75rem; margin-top: 10px; color: #4a6480;">
                    (SuperAdmin role with full access)
                </p>
            </div>
        </div>
    </div>

    <script>
        // Show/Hide Password
        const showPasswordCheckbox = document.getElementById('showPassword');
        const passwordInput = document.getElementById('password');

        showPasswordCheckbox.addEventListener('change', () => {
            passwordInput.type = showPasswordCheckbox.checked ? 'text' : 'password';
        });

        // Form Submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const userId = document.getElementById('user_id').value;
            const password = document.getElementById('password').value;
            const loading = document.getElementById('loading');
            const btn = document.querySelector('.btn-login');

            btn.disabled = true;
            loading.style.display = 'block';

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ user_id: userId, password: password })
                });

                if (response.ok) {
                    const data = await response.json();
                    window.location.href = '/dashboard';
                } else {
                    const data = await response.json();
                    showAlert(data.error || 'Login failed', 'danger');
                    btn.disabled = false;
                    loading.style.display = 'none';
                }
            } catch (error) {
                showAlert('Connection error: ' + error.message, 'danger');
                btn.disabled = false;
                loading.style.display = 'none';
            }
        });

        function showAlert(message, type) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
            alertDiv.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            document.querySelector('.card').prepend(alertDiv);
            
            setTimeout(() => {
                alertDiv.remove();
            }, 5000);
        }
    </script>
</body>
</html>
